<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- Linking the external CSS -->
    <link rel="stylesheet" href="portfolio.css">
<body>
<header>
<nav class="Nav">
    <a href="Home.html" class="logo">Mithresh M</a>
    <ul class="Nav-links">
        <li><a href="Home.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="Projects.html">Projects</a></li>
        <li><a href="Resume.html">Resume</a></li>
    </ul>
</nav>


    <div class="container">
        
        <h1 class="page-title">Contact</h1>

        <div class="content-wrapper">
            
            <div class="contact-info">
                <h2>Get in Touch</h2>
                <p>
                    Have a question, idea, or just want to talk tech and creativity? 
                    I'd love to hear from you and see where the conversation takes us!
                </p>

                <div class="social-links">
                    <span class="social-label">Social Links:</span>
                    <div class="social-icons">
                        <a href="#" class="icon-box"><i class="fab fa-linkedin-in"></i></a>
                        <a href="#" class="icon-box"><i class="fab fa-github"></i></a>
                        <a href="#" class="icon-box"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="icon-box"><i class="far fa-envelope"></i></a>
                    </div>
                </div>
            </div>

            <div class="form-card">
                <form action="#" method="POST" class="form-grid">
                    
                    <div class="left-inputs">
                        <div class="input-group">
                            <label for="fullname">Full name</label>
                            <input type="text" id="fullname" name="fullname" placeholder="Mithresh">
                        </div>

                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="mithresh@gmail.com">
                        </div>

                        <div class="input-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="Your subject here...">
                        </div>
                    </div>

                    <div class="right-inputs">
                        <div class="input-group" style="height: 100%;">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" placeholder="Your message here..."></textarea>
                        </div>
                        
                        <button type="submit" class="submit-btn">
                            Submit <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>
</html>
